<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>إدارة الحضور - إعدادية النجدين</title>
    <style>
        body { font-family: sans-serif; padding: 20px; background: #f4f4f9; text-align: center; }
        .container { max-width: 950px; margin: auto; background: white; padding: 20px; border-radius: 10px; box-shadow: 0 0 10px rgba(0,0,0,0.1); }
        .controls { background: #e9ecef; padding: 15px; border-radius: 8px; margin-bottom: 20px; }
        input, select, button { padding: 8px; margin: 5px; border-radius: 4px; border: 1px solid #ccc; }
        table { width: 100%; border-collapse: collapse; margin-top: 20px; }
        th, td { border: 1px solid #ddd; padding: 10px; }
    </style>
</head>
<body>
    <div class="container">
        <h3>المديرية العامة لتربية القادسية - تربية الحمزة - إعدادية النجدين للبنين</h3>
        <div class="controls">
            <input type="text" id="empCode" placeholder="كود الموظف">
            <input type="date" id="recordDate">
            <input type="time" id="recordTime">
            <select id="attendanceStatus">
                <option value="حاضر">حاضر</option>
                <option value="متأخر">متأخر</option>
                <option value="مجاز">مجاز</option>
                <option value="غائب">غائب</option>
            </select>
            <button onclick="saveRecord()" style="background:#007bff; color:white;">تسجيل</button>
            <hr>
            <input type="text" id="searchName" placeholder="اسم الموظف">
            <button onclick="filterByEmployee()">بحث موظف</button>
            <input type="date" id="filterDate">
            <button onclick="filterByDate()">تقرير يومي</button>
            <button onclick="filterReport('week')" style="background:#ffc107;">أسبوعي</button>
            <button onclick="filterReport('month')" style="background:#17a2b8; color:white;">شهري</button>
            <button onclick="exportTableToCSV()" style="background:#28a745; color:white;">تصدير Excel</button>
            <button onclick="renderTable(records)">عرض الكل</button>
        </div>
        <table id="attendanceTable">
            <thead><tr><th>الاسم</th><th>التاريخ</th><th>الوقت</th><th>الحالة</th><th>إجراء</th></tr></thead>
            <tbody id="tableBody"></tbody>
        </table>
    </div>
    <script>
        let records = JSON.parse(localStorage.getItem('records')) || [];
        let employees = {"101": "رحيم", "102": "عصام"};
        let currentData = records;


        function saveRecord() {
            const code = document.getElementById('empCode').value;
            const status = document.getElementById('attendanceStatus').value;
            records.push({name: employees[code] || "غير معروف", date: document.getElementById('recordDate').value, time: document.getElementById('recordTime').value, status: status});
            localStorage.setItem('records', JSON.stringify(records));
            renderTable(records);
        }


        function filterReport(type) {
            const now = new Date();
            const filtered = records.filter(r => {
                const rDate = new Date(r.date);
                if(type === 'month') return rDate.getMonth() === now.getMonth() && rDate.getFullYear() === now.getFullYear();
                if(type === 'week') {
                    const diff = (now - rDate) / (1000 * 60 * 60 * 24);
                    return diff >= 0 && diff <= 7;
                }
            });
            renderTable(filtered);
        }


        function filterByEmployee() {
            const name = document.getElementById('searchName').value;
            renderTable(records.filter(r => r.name.includes(name)));
        }


        function filterByDate() {
            const date = document.getElementById('filterDate').value;
            renderTable(records.filter(r => r.date === date));
        }


        function exportTableToCSV() {
            let csv = "\uFEFFالاسم,التاريخ,الوقت,الحالة\n";
            currentData.forEach(r => csv += `${r.name},${r.date},${r.time},${r.status}\n`);
            let blob = new Blob([csv], {type: 'text/csv;charset=utf-8;'});
            let link = document.createElement("a");
            link.href = URL.createObjectURL(blob);
            link.download = "تقرير.csv";
            link.click();
        }


        function renderTable(data) {
            currentData = data;
            const tbody = document.getElementById('tableBody');
            tbody.innerHTML = "";
            data.forEach((rec, index) => {
                tbody.innerHTML += `<tr><td>${rec.name}</td><td>${rec.date}</td><td>${rec.time}</td><td>${rec.status}</td>
                <td><button onclick="deleteRecord(${index})">حذف</button></td></tr>`;
            });
        }
        function deleteRecord(index) { records.splice(index, 1); localStorage.setItem('records', JSON.stringify(records)); renderTable(records); }
        renderTable(records);
    </script>
</body>
</html>
