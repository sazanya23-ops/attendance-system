<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>إدارة الحضور - إعدادية النجدين</title>
    <style>
        body { font-family: sans-serif; padding: 20px; background: #f4f4f9; text-align: center; }
        .container { max-width: 950px; margin: auto; background: white; padding: 20px; border-radius: 10px; box-shadow: 0 0 10px rgba(0,0,0,0.1); }
        .controls { background: #e9ecef; padding: 15px; border-radius: 8px; margin-bottom: 20px; }
        input, select, button { padding: 8px; margin: 5px; border-radius: 4px; border: 1px solid #ccc; }
        table { width: 100%; border-collapse: collapse; margin-top: 20px; }
        th, td { border: 1px solid #ddd; padding: 10px; }
    </style>
</head>
<body>
    <div class="container">
        <h3>المديرية العامة لتربية القادسية - تربية الحمزة - إعدادية النجدين للبنين</h3>


        <div class="controls">
            <input type="text" id="empCode" placeholder="كود الموظف">
            <input type="date" id="recordDate">
            <input type="time" id="recordTime">
            <select id="attendanceStatus">
                <option value="حاضر">حاضر</option>
                <option value="متأخر">متأخر</option>
                <option value="مجاز">مجاز</option>
                <option value="غائب">غائب</option>
            </select>
            <button onclick="saveRecord()" style="background:#007bff; color:white;">تسجيل</button>
            <hr>
            <input type="date" id="filterDate">
            <button onclick="filterByDate()">تقرير تاريخ محدد</button>
            <button onclick="exportToExcel()" style="background:#28a745; color:white;">تصدير إلى Excel</button>
            <button onclick="renderTable(records)">عرض الكل</button>
        </div>


        <table id="attendanceTable">
            <thead><tr><th>الاسم</th><th>التاريخ</th><th>الوقت</th><th>الحالة</th><th>إجراء</th></tr></thead>
            <tbody id="tableBody"></tbody>
        </table>
    </div>


    <script>
        let records = JSON.parse(localStorage.getItem('records')) || [];
        let employees = JSON.parse(localStorage.getItem('employees')) || {};


        document.getElementById('recordDate').valueAsDate = new Date();
        document.getElementById('recordTime').value = new Date().toLocaleTimeString([], {hour: '2-digit', minute:'2-digit', hour12: false});


        function saveRecord() {
            const code = document.getElementById('empCode').value;
            const date = document.getElementById('recordDate').value;
            const time = document.getElementById('recordTime').value;
            const status = document.getElementById('attendanceStatus').value;
            if(!employees[code]) { alert("كود غير موجود!"); return; }
            records.push({name: employees[code], date: date, time: time, status: status});
            localStorage.setItem('records', JSON.stringify(records));
            renderTable(records);
        }


        function filterByDate() {
            const date = document.getElementById('filterDate').value;
            if(!date) return;
            renderTable(records.filter(r => r.date === date));
        }


        function exportToExcel() {
            let table = document.getElementById("attendanceTable");
            let html = table.outerHTML;
            let url = 'data:application/vnd.ms-excel,' + encodeURIComponent(html);
            let link = document.createElement("a");
            link.download = "تقرير_الحضور.xls";
            link.href = url;
            link.click();
        }


        function renderTable(data) {
            const tbody = document.getElementById('tableBody');
            tbody.innerHTML = "";
            data.forEach((rec, index) => {
                tbody.innerHTML += `<tr><td>${rec.name}</td><td>${rec.date}</td><td>${rec.time}</td><td>${rec.status}</td>
                <td><button onclick="deleteRecord(${index})">حذف</button></td></tr>`;
            });
        }


        function deleteRecord(index) { records.splice(index, 1); localStorage.setItem('records', JSON.stringify(records)); renderTable(records); }
        renderTable(records);
    </script>
</body>
</html>
