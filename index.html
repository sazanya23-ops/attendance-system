<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>نظام الحضور - إعدادية النجدين للبنين</title>
    <style>
        body { font-family: sans-serif; padding: 20px; background: #f4f4f9; text-align: center; }
        .container { max-width: 900px; margin: auto; background: white; padding: 20px; border-radius: 10px; box-shadow: 0 0 10px rgba(0,0,0,0.1); }
        .header-info { margin-bottom: 20px; border-bottom: 2px solid #007bff; padding-bottom: 10px; }
        input { padding: 10px; width: 250px; margin-bottom: 10px; border: 1px solid #ccc; border-radius: 5px; }
        button { padding: 10px 25px; background: #007bff; color: white; border: none; cursor: pointer; border-radius: 5px; }
        table { width: 100%; border-collapse: collapse; margin-top: 20px; }
        th, td { border: 1px solid #ddd; padding: 12px; }
        th { background-color: #007bff; color: white; }
    </style>
</head>
<body>
    <div class="container">
        <div class="header-info">
            <h3 id="directorateName">المديرية العامة لتربية القادسية مديرية تربية الحمزة </h3>
            <h3 id="schoolName">إعدادية النجدين </h3>
            <h2>نظام تسجيل الحضور والانصراف</h2>
        </div>


        <input type="text" id="empCode" placeholder="أدخل كود الموظف">
        <br>
        <button onclick="recordAttendance()">تسجيل الحضور</button>


        <table id="attendanceTable">
            <tr>
                <th>الاسم</th>
                <th>التاريخ</th>
                <th>اليوم</th>
                <th>وقت الحضور</th>
                <th>الحالة</th>
            </tr>
        </table>
    </div>


    <script>
        // --- منطقة الإعدادات ---
        const SCHOOL_NAME = "إعدادية النجدين للبنين";
        const START_HOUR = 8; // يمكنك تغيير وقت بدء الدوام هنا (مثلاً 7 أو 8)


        // تحديث اسم المدرسة تلقائياً
        document.getElementById('schoolName').innerText = SCHOOL_NAME;


        const employees = { "101": "أحمد محمد", "104": "عصام" "103": "عدنان تركي ", "102": "رحيم عبدالله"  }



        function recordAttendance() {
            const code = document.getElementById('empCode').value;
            if (!employees[code]) { alert("كود غير صحيح!"); return; }


            const now = new Date();
            const days = ["الأحد", "الاثنين", "الثلاثاء", "الأربعاء", "الخميس", "الجمعة", "السبت"];
            const row = document.getElementById('attendanceTable').insertRow(1);


            // المقارنة مع وقت بدء الدوام المحدد في الإعدادات
            const status = (now.getHours() < START_HOUR) ? "حاضر" : "متأخر";


            row.innerHTML = `<td>${employees[code]}</td>
                             <td>${now.toLocaleDateString()}</td>
                             <td>${days[now.getDay()]}</td>
                             <td>${now.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' })}</td>
                             <td>${status}</td>`;
        }
    </script>
</body>
</html>
