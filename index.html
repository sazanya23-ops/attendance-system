<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>إدارة الحضور - إعدادية التجدين للبنين</title>
    <style>
        body { font-family: sans-serif; padding: 20px; background: #f4f4f9; text-align: center; }
        .container { max-width: 950px; margin: auto; background: white; padding: 20px; border-radius: 10px; box-shadow: 0 0 10px rgba(0,0,0,0.1); }
        .controls { background: #e9ecef; padding: 15px; border-radius: 8px; margin-bottom: 20px; }
        input, select, button { padding: 8px; margin: 5px; }
        table { width: 100%; border-collapse: collapse; margin-top: 20px; }
        th, td { border: 1px solid #ddd; padding: 10px; }
    </style>
</head>
<body>
<div class="container">
    <h2>إدارة الحضور - إعدادية التجدين للبنين</h2>
    <div class="controls">
        <input type="text" id="empName" placeholder="اسم الموظف">
        <input type="text" id="empCode" placeholder="كود الموظف">
        <button onclick="saveEmployee()">حفظ الموظف</button>
    </div>
    <div class="controls">
        <select id="selectEmp"></select>
        <select id="status"><option>حاضر</option><option>غائب</option></select>
        <input type="date" id="dateInput">
        <input type="time" id="timeInput">
        <button onclick="recordAttendance()">تسجيل</button>
    </div>
    <div class="controls">
        <button onclick="filterReport('week')">تقرير أسبوعي</button>
        <button onclick="filterReport('month')">تقرير شهري</button>
        <button onclick="resetTable()">عرض الكل</button>
    </div>
    <table id="attendanceTable">
        <thead><tr><th>التاريخ</th><th>الوقت</th><th>الاسم</th><th>الحالة</th><th>إجراء</th></tr></thead>
        <tbody></tbody>
    </table>
</div>


<script>
    // تعيين الوقت والتاريخ الحالي تلقائياً عند فتح الصفحة
    window.onload = function() {
        const now = new Date();
        document.getElementById('dateInput').value = now.toISOString().split('T')[0];
        document.getElementById('timeInput').value = now.toTimeString().split(':').slice(0,2).join(':');
    };


    function saveEmployee() {
        const name = document.getElementById('empName').value;
        const code = document.getElementById('empCode').value;
        if(name && code) {
            const select = document.getElementById('selectEmp');
            const opt = document.createElement('option');
            opt.value = code;
            opt.innerHTML = name;
            select.appendChild(opt);
            alert('تم حفظ الموظف');
        }
    }


    function recordAttendance() {
        const table = document.getElementById('attendanceTable').getElementsByTagName('tbody')[0];
        const row = table.insertRow();
        row.insertCell(0).innerHTML = document.getElementById('dateInput').value;
        row.insertCell(1).innerHTML = document.getElementById('timeInput').value;
        row.insertCell(2).innerHTML = document.getElementById('selectEmp').options[document.getElementById('selectEmp').selectedIndex].text;
        row.insertCell(3).innerHTML = document.getElementById('status').value;
        row.insertCell(4).innerHTML = '<button onclick="this.parentElement.parentElement.remove()">حذف</button>';
    }


    function filterReport(type) {
        alert('تم تصفية الجدول لعرض التقرير الـ ' + type);
        // يمكننا إضافة منطق برمجي متقدم لفلترة الصفوف لاحقاً
    }


    function resetTable() { alert('عرض جميع البيانات'); }
</script>
</body>
</html>
