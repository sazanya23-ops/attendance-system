<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>نظام الحضور الذكي</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, sans-serif; padding: 20px; background: #eef2f3; }
        .container { max-width: 900px; margin: auto; background: white; padding: 25px; border-radius: 15px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
        h2 { text-align: center; color: #333; }
        .input-group { display: flex; gap: 10px; justify-content: center; margin-bottom: 20px; }
        input { padding: 12px; width: 250px; border: 2px solid #ddd; border-radius: 8px; }
        button { padding: 10px 25px; background: #007bff; color: white; border: none; border-radius: 8px; cursor: pointer; font-weight: bold; }
        table { width: 100%; border-collapse: collapse; margin-top: 10px; }
        th { background: #007bff; color: white; padding: 12px; }
        td { border: 1px solid #eee; padding: 12px; text-align: center; }
        .late { color: #dc3545; font-weight: bold; }
        .ontime { color: #28a745; font-weight: bold; }
    </style>
</head>
<body>
    <div class="container">
        <h2>نظام تسجيل الحضور والانصراف</h2>
        <div class="input-group">
            <input type="text" id="empCode" placeholder="أدخل كود الموظف">
            <button onclick="recordAttendance()">تسجيل</button>
        </div>
        <table id="attendanceTable">
            <tr>
                <th>الاسم</th>
                <th>التاريخ</th>
                <th>اليوم</th>
                <th>وقت الحضور</th>
                <th>الحالة</th>
            </tr>
        </table>
    </div>


    <script>
        // قاعدة بيانات الموظفين
        const employees = {
            "101": "أحمد محمد",
            "102": "سارة أحمد"
        };


        function recordAttendance() {
            const code = document.getElementById('empCode').value;
            if (!employees[code]) { alert("كود غير صحيح!"); return; }


            const now = new Date();
            const days = ["الأحد", "الاثنين", "الثلاثاء", "الأربعاء", "الخميس", "الجمعة", "السبت"];


            const name = employees[code];
            const date = now.toLocaleDateString();
            const day = days[now.getDay()];
            const time = now.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });


            // تحديد الحالة (مثلاً الدوام يبدأ 8:00 صباحاً)
            const hour = now.getHours();
            const status = (hour < 8) ? "حاضر" : "متأخر";
            const statusClass = (hour < 8) ? "ontime" : "late";


            const table = document.getElementById('attendanceTable');
            const row = table.insertRow(1);
            row.innerHTML = `<td>${name}</td><td>${date}</td><td>${day}</td><td>${time}</td><td class="${statusClass}">${status}</td>`;
        }
    </script>
</body>
</html>
