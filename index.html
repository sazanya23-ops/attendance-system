<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>نظام الحضور والانصراف</title>
    <style>
        body { font-family: sans-serif; padding: 20px; background: #f4f4f9; }
        .container { max-width: 800px; margin: auto; background: white; padding: 20px; border-radius: 10px; box-shadow: 0 0 10px rgba(0,0,0,0.1); }
        input { padding: 10px; width: 200px; }
        button { padding: 10px 20px; background: #28a745; color: white; border: none; cursor: pointer; }
        table { width: 100%; border-collapse: collapse; margin-top: 20px; }
        th, td { border: 1px solid #ddd; padding: 10px; text-align: center; }
        .late { color: red; font-weight: bold; }
        .ontime { color: green; font-weight: bold; }
    </style>
</head>
<body>
    <div class="container">
        <h2>نظام تسجيل الحضور</h2>
        <input type="text" id="empCode" placeholder="أدخل كود الموظف">
        <button onclick="recordAttendance()">تسجيل الحضور</button>


        <table id="attendanceTable">
            <tr>
                <th>الكود</th>
                <th>التاريخ</th>
                <th>وقت الحضور</th>
                <th>الحالة</th>
            </tr>
        </table>
    </div>


    <script>
        function recordAttendance() {
            const code = document.getElementById('empCode').value;
            const now = new Date();
            const date = now.toLocaleDateString();
            const time = now.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
            const hour = now.getHours();
            const status = (hour < 8) ? "حاضر" : "متأخر";
            const statusClass = (hour < 8) ? "ontime" : "late";


            const table = document.getElementById('attendanceTable');
            const row = table.insertRow(1);
            row.innerHTML = `<td>${code}</td><td>${date}</td><td>${time}</td><td class="${statusClass}">${status}</td>`;
        }
    </script>
</body>
</html>
